<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veltrane</title>
  <link rel="icon" href="assets/icon/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <script defer src="assets/js/authentication.js"></script>
</head>

<body>
  <img class="vl__background" src="assets/image/background.gif" alt="Page background">

  <main class="vl__authenticate">
    <img class="vl__favicon" src="assets/icon/favicon.svg" alt="">

    <div class="vl__options">
      <h1>Log in to Veltrane</h1>
      <input type="email" placeholder="Email address" title="" required>
      <div class="vl__password">
        <input type="password" maxlength="30" placeholder="Password">
        <button>
          <img src="assets/icon/visibility-off.svg" alt="">
          <img src="assets/icon/visibility.svg" alt="" hidden>
        </button>
      </div>
      <p class="vl__error"></p>
      <button class="vl__button-proceed login"><span>Continue</span>
        <div class="vl__proceed-loader"></div>
      </button>
      <p>Don't have an account? <a href="pages/register.html">Sign up</a></p>
    </div>
  </main>
</body>

</html>
