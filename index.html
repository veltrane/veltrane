<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veltrane</title>
  <link rel="icon" href="assets/image/favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <img class="vl__background" src="assets/image/background.gif" alt="Page background">

  <main>
    <img class="vl__favicon" src="assets/image/favicon.svg" alt="">

    <div class="vl__options">
      <h1>Log in to Veltrane</h1>
      <input type="email" placeholder="Email address" required>
      <input type="password" placeholder="Password" required>
      <button>Continue</button>
    </div>
  </main>
</body>

</html>
