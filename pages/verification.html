<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veltrane</title>
  <link rel="icon" href="../assets/icon/favicon.svg">
  <link rel="stylesheet" href="../assets/css/authentication.css">
  <script defer src="../assets/js/authentication.js"></script>
</head>

<body>
  <img class="vl__background" src="../assets/image/background.gif" alt="Page background">

  <main class="vl__authenticate">
    <img class="vl__favicon" src="../assets/icon/favicon.svg" alt="">

    <div class="vl__options">
      <h1>Check your email</h1>
      <div class="vl__code-message">
        <p>We've sent you a temporary login code.</p>
        <p>Please check your inbox at</p>
        <span></span>
      </div>
      <input type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="Enter code"
        autocomplete="one-time-code" required>
      <p class="vl__error"></p>
      <button class="vl__button-proceed verify-code"><span>Continue</span>
        <div class="vl__proceed-loader"></div>
      </button>
      <p>Already have an account? <a href="../index.html">Log in</a></p>
    </div>
  </main>
</body>

</html>
