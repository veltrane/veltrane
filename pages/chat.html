<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arman</title>
  <link rel="icon" href="../assets/icon/favicon.svg">
  <link rel="stylesheet" href="../assets/css/chat.css">
  <script defer src="../assets/js/chat.js"></script>
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@latest/dist/dotlottie-wc.js" type="module"></script>
</head>

<body>
  <img class="vl__background" src="../assets/image/chat-background-1.jpg" alt="Page background">

  <header>
    <div class="vl__user-profile">
      <img src="../assets/image/temp-avatar.jpg" alt="Profile picture">
      <span>Hina</span>
    </div>
    <div class="vl__chat-options">
      <button>
        <img src="../assets/icon/voice-call.svg" alt="">
      </button>
      <button>
        <img src="../assets/icon/video-call.svg" alt="">
      </button>
      <button>
        <img src="../assets/icon/information.svg" alt="">
      </button>
    </div>
  </header>

  <main class="vl__chat">
    <dotlottie-wc src="../assets/animated/1f198.lottie" autoplay loop mode="forward"
      style="width: 80px; height: 80px"></dotlottie-wc>
  </main>

  <div class="vl__message">
    <button>
      <img src="../assets/icon/emoji.svg" alt="">
    </button>
    <textarea placeholder="Message..." rows="1"></textarea>
    <div class="vl__message-more">
      <button>
        <img src="../assets/icon/microphone.svg" alt="">
      </button>
      <button>
        <img src="../assets/icon/image.svg" alt="">
      </button>
      <button>
        <img src="../assets/icon/sticker.svg" alt="">
      </button>
    </div>
    <button>
      <svg xmlns="http://www.w3.org/2000/svg" width="26px" viewBox="0 -960 960 960" fill="currentColor">
        <path
          d="M176-183q-20 8-38-3.5T120-220v-180l320-80-320-80v-180q0-22 18-33.5t38-3.5l616 260q25 11 25 37t-25 37L176-183Z" />
      </svg>
    </button>
  </div>
</body>

</html>
